# SearXNG configuration

general:
  debug: true
  instance_name: "SearXNG Local"
  privacypolicy_url: false
  donation_url: false

search:
  safe_search: 1
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  base_url: "http://localhost:8888/"
  secret_key: "change_me_to_a_random_secure_string"

ui:
  default_theme: "simple"
  default_locale: "en"
  items_per_page: 30

outgoing:
  # Search engines should NOT go through Tor — they're non-sensitive discovery
  # and many block Tor IPs. Use direct access for speed and reliability.
  # Tweet extraction (sensitive) uses Tor+Lightpanda separately.
  request_timeout: 10.0
  pool_connections: 100
  pool_maxsize: 20

engines:
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: true
    timeout: 10
    comment: "Disabled: too aggressive CAPTCHA on automated queries"
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
    timeout: 10
    categories: [general, news]
  - name: bing news
    engine: bing_news
    shortcut: bin
    disabled: false
    timeout: 10
    categories: [news]
  - name: brave
    engine: brave
    shortcut: brave
    disabled: false
    timeout: 10
    categories: [general]
  - name: mojeek
    engine: mojeek
    shortcut: mjk
    disabled: true
    timeout: 10
    comment: "Disabled: blocks too frequently"
  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: true
    timeout: 10
    comment: "Disabled: CAPTCHA rate limit"
  - name: qwant
    engine: qwant
    shortcut: qwant
    disabled: true
    timeout: 10
    comment: "Disabled: missing config attribute qwant.qwant_categ"
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
    timeout: 10
    categories: [general]
  - name: google
    engine: google
    shortcut: google
    disabled: false
    timeout: 10
    categories: [general, news]

currencies:
  - USD
  - EUR
  - GBP

languages:
  - en
  - es
  - fr
  - de
  - it
  - pt
  - ru
  - ja
  - ko
  - zh

# DOI resolvers (must be at top level, not nested)
doi_resolvers:
  oadoi.org: "https://oadoi.org/"
  doi.org: "https://doi.org/"

default_doi_resolver: "oadoi.org"
