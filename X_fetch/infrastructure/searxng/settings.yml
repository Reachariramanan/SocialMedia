# SearXNG settings for X/Twitter discovery
use_default_settings: true

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "ultra-secret-key"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: go
  - name: bing
    engine: bing
    shortcut: bi
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
