version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    volumes:
      - ../searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/

volumes:
  redis_data:
