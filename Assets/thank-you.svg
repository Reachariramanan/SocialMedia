<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Decorative top accent line -->
  <rect x="0" y="0" width="800" height="4" fill="url(#accentGrad)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="#6366f1" opacity="0.05"/>
  <circle cx="700" cy="320" r="80" fill="#8b5cf6" opacity="0.05"/>
  <circle cx="650" cy="60" r="40" fill="#a78bfa" opacity="0.05"/>

  <!-- Shield icon -->
  <g transform="translate(400, 80)" filter="url(#glow)">
    <path d="M0,-35 L30,-15 L30,15 L0,35 L-30,15 L-30,-15 Z" fill="none" stroke="#8b5cf6" stroke-width="2.5" opacity="0.8"/>
    <path d="M0,-25 L20,-10 L20,10 L0,25 L-20,10 L-20,-10 Z" fill="#6366f1" opacity="0.2"/>
    <text x="0" y="5" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">SMI</text>
  </g>

  <!-- "Thank You" heading -->
  <text x="400" y="165" text-anchor="middle" fill="#f1f5f9" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" letter-spacing="3">
    THANK YOU
  </text>

  <!-- Subtitle -->
  <text x="400" y="200" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" letter-spacing="1">
    for exploring the Social Media Intelligence Platform
  </text>

  <!-- Divider -->
  <line x1="340" y1="220" x2="460" y2="220" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Tagline -->
  <text x="400" y="255" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" letter-spacing="0.5" filter="url(#glow)">
    This entire reporter can fulfill them more
  </text>

  <!-- Feature pills -->
  <g transform="translate(400, 300)">
    <rect x="-180" y="-16" width="110" height="32" rx="16" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
    <text x="-125" y="5" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Automated</text>
    
    <rect x="-55" y="-16" width="110" height="32" rx="16" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Multi-Agent</text>
    
    <rect x="70" y="-16" width="110" height="32" rx="16" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
    <text x="125" y="5" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Intelligent</text>
  </g>

  <!-- Decorative bottom accent line -->
  <rect x="0" y="396" width="800" height="4" fill="url(#accentGrad)"/>
</svg>
